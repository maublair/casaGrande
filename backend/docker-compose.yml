# ==================================================================
# Backend self-host (mini-Supabase) para Casa Grande.
# Postgres + PostgREST (/rest/v1) + GoTrue (/auth/v1) + router nginx.
# Expuesto SOLO vía casagrande-api (bcode_gateway) -> NPM -> cloudflared.
# db/rest/auth sin puertos al host (red interna casagrande-net).
# ==================================================================
name: casagrande-backend

services:
  db:
    image: postgres:15-alpine
    container_name: casagrande-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_PW: ${DB_PW}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [casagrande-net]

  rest:
    image: postgrest/postgrest:v12.2.3
    container_name: casagrande-rest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://authenticator:${DB_PW}@casagrande-db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_OPENAPI_SERVER_PROXY_URI: ${API_EXTERNAL_URL}/rest/v1
    depends_on:
      db:
        condition: service_healthy
    networks: [casagrande-net]

  auth:
    image: supabase/gotrue:v2.151.0
    container_name: casagrande-auth
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      PORT: "9999"
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${DB_PW}@casagrande-db:5432/postgres?search_path=auth
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: "*"
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}/auth/v1
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_DISABLE_SIGNUP: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_LOG_LEVEL: info
    depends_on:
      db:
        condition: service_healthy
    networks: [casagrande-net]

  api:
    image: nginx:1.27-alpine
    container_name: casagrande-api
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [rest, auth]
    networks: [casagrande-net, bcode_gateway]

volumes:
  pgdata:
    driver: local

networks:
  casagrande-net:
    driver: bridge
  bcode_gateway:
    external: true

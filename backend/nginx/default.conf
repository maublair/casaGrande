server {
  listen 8000;
  server_name _;
  resolver 127.0.0.11 valid=30s ipv6=off;
  client_max_body_size 25m;

  location = / { default_type text/plain; return 200 'casagrande-api ok\n'; }
  location = /health { default_type text/plain; return 200 'ok\n'; }

  # ---------------- PostgREST (/rest/v1 -> /) ----------------
  location /rest/v1/ {
    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin  $http_origin always;
      add_header Access-Control-Allow-Credentials true always;
      add_header Access-Control-Allow-Methods "GET, POST, PATCH, PUT, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "authorization, apikey, content-type, accept-profile, content-profile, prefer, range, x-client-info, x-supabase-api-version" always;
      add_header Access-Control-Max-Age 86400 always;
      add_header Content-Length 0;
      return 204;
    }
    proxy_hide_header Access-Control-Allow-Origin;
    add_header Access-Control-Allow-Origin  $http_origin always;
    add_header Access-Control-Allow-Credentials true always;
    add_header Access-Control-Expose-Headers "content-range, content-profile, content-location" always;
    set $up_rest casagrande-rest;
    rewrite ^/rest/v1/(.*)$ /$1 break;
    proxy_pass http://$up_rest:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  # ---------------- GoTrue (/auth/v1 -> /) ----------------
  location /auth/v1/ {
    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin  $http_origin always;
      add_header Access-Control-Allow-Credentials true always;
      add_header Access-Control-Allow-Methods "GET, POST, PATCH, PUT, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "authorization, apikey, content-type, x-client-info, x-supabase-api-version" always;
      add_header Access-Control-Max-Age 86400 always;
      add_header Content-Length 0;
      return 204;
    }
    proxy_hide_header Access-Control-Allow-Origin;
    add_header Access-Control-Allow-Origin  $http_origin always;
    add_header Access-Control-Allow-Credentials true always;
    set $up_auth casagrande-auth;
    rewrite ^/auth/v1/(.*)$ /$1 break;
    proxy_pass http://$up_auth:9999;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
